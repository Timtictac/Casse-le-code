<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casse le Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>

<body>
<div class="game" id="jeu"></div>

<script type="module">
import * as moteur from './jeu.js';

let partie = null;
let ongletHist = 'tous'; // 'tous' | 'humain' | 'ia'

// --- Rendu utilitaires --------------------------------------------------------

function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'onclick') e.onclick = v;
    else if (k === 'dataset') Object.assign(e.dataset, v);
    else if (k === 'disabled') { if (v) e.disabled = true; }
    else if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function carteDOM(carte, taille = '') {
  if (!carte) {
    return el('div', { class: `card card-cachée ${taille}` });
  }
  const [v, c] = carte;
  return el('div', { class: `card card-${c} ${taille}` }, [
    el('div', { class: 'val' }, String(v)),
    el('div', { class: 'coul' }, c),
  ]);
}

// --- Actions du jeu (moteur local, pas de réseau) ----------------------------

function nouvellePartie() {
  partie = moteur.nouvellePartie();
  rendre();
  if (partie.tour === 'ia' && !partie.fini) setTimeout(tourIA, 900);
}

function poserQuestion(idx) {
  try {
    partie = moteur.poserQuestion(idx);
    rendre();
    if (partie.tour === 'ia' && !partie.fini) setTimeout(tourIA, 900);
  } catch (e) { toast(e.message); }
}

function deviner(cartes) {
  try {
    partie = moteur.deviner(cartes);
    rendre();
  } catch (e) { toast(e.message); }
}

function tourIA() {
  try {
    const avantTerminée = partie.ia_terminée;
    partie = moteur.tourIA();
    rendre();
    if (!avantTerminée && partie.ia_terminée) {
      toast(partie.ia_correcte
        ? 'L\'IA pense avoir trouvé votre main. À vous de finir.'
        : 'L\'IA a tenté sa devinette et s\'est trompée. À vous.');
    }
    if (partie.tour === 'ia' && !partie.fini) setTimeout(tourIA, 900);
  } catch (e) { toast(e.message); }
}

// --- Toast -------------------------------------------------------------------

let toastTimer = null;
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = el('div', { class: 'toast' });
  t.innerHTML = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 3200);
}

// --- Modale de devinette -----------------------------------------------------

function ouvrirModaleDevinette() {
  const slots = [
    { v: '', c: '' }, { v: '', c: '' }, { v: '', c: '' },
    { v: '', c: '' }, { v: '', c: '' },
  ];

  const overlay = el('div', { class: 'modal-overlay' });
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  const modale = el('div', { class: 'modal' });
  overlay.appendChild(modale);

  function erreur(s) {
    if (!s.v || !s.c) return null;
    if (s.v === '5' && s.c !== 'V') return 'Le 5 est vert';
    if (s.v !== '5' && s.c === 'V') return 'Seul le 5 est vert';
    return null;
  }

  function majContraintesCouleur(select, v) {
    select.innerHTML = '';
    select.appendChild(new Option('Coul.', ''));
    if (v !== '5') {
      select.appendChild(new Option('N — Noir', 'N'));
      select.appendChild(new Option('B — Blanc', 'B'));
    }
    select.appendChild(new Option('V — Vert', 'V'));
  }

  function redessiner() {
    modale.innerHTML = '';
    modale.appendChild(el('div', { class: 'modal-title' }, 'Deviner la main de l\'IA'));
    modale.appendChild(el('div', { class: 'modal-subtitle' },
      'Sélectionnez les 5 cartes de la main adverse. Le 5 n\'existe qu\'en vert.'));

    const row = el('div', { style: 'display:flex;gap:8px;margin-bottom:16px;' });
    const errs = slots.map(erreur);

    slots.forEach((s, i) => {
      const cls = 'guess-slot' + (errs[i] ? ' error' : (s.v && s.c ? ' active' : ''));
      const slot = el('div', { class: cls });
      slot.appendChild(el('label', {}, `Carte ${i + 1}`));

      const preview = el('div', { style: 'height:44px;display:flex;align-items:center;justify-content:center;' });
      if (s.v && s.c) preview.appendChild(carteDOM([parseInt(s.v), s.c], 'card-xs'));
      else preview.appendChild(el('div', { style: 'width:36px;height:48px;border:1px dashed var(--border2);border-radius:5px;' }));
      slot.appendChild(preview);

      const selV = el('select');
      selV.appendChild(new Option('Val.', ''));
      for (let v = 0; v <= 9; v++) selV.appendChild(new Option(v, String(v)));
      selV.value = s.v;
      selV.onchange = () => {
        s.v = selV.value;
        if (s.v === '5') s.c = 'V';
        else if (s.c === 'V') s.c = '';
        redessiner();
      };
      slot.appendChild(selV);

      const selC = el('select');
      majContraintesCouleur(selC, s.v);
      selC.value = s.c;
      if (s.v === '5') selC.disabled = true;
      selC.onchange = () => { s.c = selC.value; redessiner(); };
      slot.appendChild(selC);

      if (errs[i]) slot.appendChild(el('div', { class: 'constraint-error' }, errs[i]));
      row.appendChild(slot);
    });
    modale.appendChild(row);

    const ok = slots.every(s => s.v && s.c) && errs.every(e => !e);
    const boutons = el('div', { style: 'display:flex;gap:10px;margin-top:20px;justify-content:flex-end;' });
    boutons.appendChild(el('button', {
      class: 'btn btn-ghost',
      onclick: () => overlay.remove(),
    }, 'Annuler'));
    const btnOk = el('button', {
      class: 'btn btn-primary',
      onclick: () => {
        overlay.remove();
        deviner(slots.map(s => [parseInt(s.v), s.c]));
      },
    }, '✦ Confirmer');
    if (!ok) btnOk.disabled = true;
    boutons.appendChild(btnOk);
    modale.appendChild(boutons);
  }

  redessiner();
  document.body.appendChild(overlay);
}

// --- Astuces (tutoriels Markdown) --------------------------------------------

let tutosManifest = null;
const tutosCache = new Map(); // id -> texte md
let astuceOngletActif = null;

async function chargerManifesteTutos() {
  if (tutosManifest) return tutosManifest;
  const r = await fetch('./tutos/index.json');
  tutosManifest = await r.json();
  return tutosManifest;
}

async function chargerTuto(id) {
  if (tutosCache.has(id)) return tutosCache.get(id);
  const r = await fetch(`./tutos/${id}.md`);
  if (!r.ok) throw new Error(`Tuto introuvable : ${id}`);
  const txt = await r.text();
  tutosCache.set(id, txt);
  return txt;
}

// Échappe le HTML (sécurité de base avant rendu).
function escHTML(s) {
  return s.replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  })[ch]);
}

// Remplace \5V \4N \3B par une carte connue, \? par une carte mystère (dos).
// Retourne du HTML (le contenu autour est déjà échappé).
function remplacerCartes(html) {
  html = html.replace(/\\\?/g, () =>
    `<span class="card-inline" data-carte="?"></span>`);
  return html.replace(/\\(\d)([NBV])/g, (_, v, c) =>
    `<span class="card-inline" data-carte="${v}${c}"></span>`);
}

// Mini-parser Markdown : titres, paragraphes, listes, gras/italique, code, tables, LaTeX.
function rendreMD(md) {
  const lignes = md.replace(/\r\n/g, '\n').split('\n');
  const out = [];
  let i = 0;

  // On extrait d'abord les formules $...$ et $$...$$ avant l'échappement HTML,
  // sinon escHTML transformerait $a < b$ en $a &lt; b$.
  const formules = [];
  const stash = (tex, mode) => {
    formules.push({ tex, mode });
    return `␀FORMULE${formules.length - 1}␀`;
  };

  const inline = (s) => {
    s = s.replace(/\$\$([^$]+?)\$\$/g, (_, tex) => stash(tex, 'block'));
    s = s.replace(/(?<!\\)\$([^$\n]+?)(?<!\\)\$/g, (_, tex) => stash(tex, 'inline'));
    s = escHTML(s);
    s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
    s = remplacerCartes(s);
    s = s.replace(/␀FORMULE(\d+)␀/g, (_, n) => {
      const f = formules[+n];
      const cls = f.mode === 'block' ? 'tex-block' : 'tex-inline';
      return `<span class="${cls}" data-tex="${escHTML(f.tex)}" data-mode="${f.mode}"></span>`;
    });
    return s;
  };

  while (i < lignes.length) {
    const l = lignes[i];

    // Bloc LaTeX $$ ... $$ multi-lignes
    if (l.trim().startsWith('$$')) {
      const buf = [];
      let première = l.trim().slice(2);
      // Cas $$...$$  sur la même ligne
      if (première.endsWith('$$')) {
        out.push(`<div class="tex-block" data-tex="${escHTML(première.slice(0, -2))}" data-mode="block"></div>`);
        i++;
        continue;
      }
      if (première) buf.push(première);
      i++;
      while (i < lignes.length && !lignes[i].trim().endsWith('$$')) {
        buf.push(lignes[i]);
        i++;
      }
      if (i < lignes.length) {
        const dernière = lignes[i].trim().slice(0, -2);
        if (dernière) buf.push(dernière);
        i++;
      }
      out.push(`<div class="tex-block" data-tex="${escHTML(buf.join('\n'))}" data-mode="block"></div>`);
      continue;
    }

    // Bloc de code ```
    if (l.startsWith('```')) {
      const buf = [];
      i++;
      while (i < lignes.length && !lignes[i].startsWith('```')) {
        buf.push(escHTML(lignes[i]));
        i++;
      }
      i++;
      out.push(`<pre><code>${buf.join('\n')}</code></pre>`);
      continue;
    }

    // Titres
    if (l.startsWith('### ')) { out.push(`<h3>${inline(l.slice(4))}</h3>`); i++; continue; }
    if (l.startsWith('## '))  { out.push(`<h2>${inline(l.slice(3))}</h2>`); i++; continue; }
    if (l.startsWith('# '))   { out.push(`<h1>${inline(l.slice(2))}</h1>`); i++; continue; }

    // Tableau (ligne avec | et ligne suivante de séparateurs)
    if (l.includes('|') && i + 1 < lignes.length && /^\s*\|?[\s\-:|]+\|?\s*$/.test(lignes[i + 1]) && lignes[i + 1].includes('-')) {
      const headers = l.split('|').map(s => s.trim()).filter(Boolean);
      i += 2;
      const rows = [];
      while (i < lignes.length && lignes[i].includes('|') && lignes[i].trim()) {
        rows.push(lignes[i].split('|').map(s => s.trim()).filter(Boolean));
        i++;
      }
      let html = '<table><thead><tr>';
      headers.forEach(h => html += `<th>${inline(h)}</th>`);
      html += '</tr></thead><tbody>';
      rows.forEach(r => {
        html += '<tr>';
        r.forEach(c => html += `<td>${inline(c)}</td>`);
        html += '</tr>';
      });
      html += '</tbody></table>';
      out.push(html);
      continue;
    }

    // Liste à puces
    if (/^\s*[-*]\s+/.test(l)) {
      const items = [];
      while (i < lignes.length && /^\s*[-*]\s+/.test(lignes[i])) {
        items.push(inline(lignes[i].replace(/^\s*[-*]\s+/, '')));
        i++;
      }
      out.push('<ul>' + items.map(it => `<li>${it}</li>`).join('') + '</ul>');
      continue;
    }

    // Liste numérotée
    if (/^\s*\d+\.\s+/.test(l)) {
      const items = [];
      while (i < lignes.length && /^\s*\d+\.\s+/.test(lignes[i])) {
        items.push(inline(lignes[i].replace(/^\s*\d+\.\s+/, '')));
        i++;
      }
      out.push('<ol>' + items.map(it => `<li>${it}</li>`).join('') + '</ol>');
      continue;
    }

    // Ligne vide
    if (!l.trim()) { i++; continue; }

    // Paragraphe (lignes consécutives jusqu'à une vide ou un bloc spécial)
    const para = [];
    while (i < lignes.length && lignes[i].trim()
           && !lignes[i].startsWith('#') && !lignes[i].startsWith('```')
           && !/^\s*[-*]\s+/.test(lignes[i]) && !/^\s*\d+\.\s+/.test(lignes[i])) {
      para.push(lignes[i]);
      i++;
    }
    out.push(`<p>${inline(para.join(' '))}</p>`);
  }

  return out.join('\n');
}

// Après injection HTML, remplit les .card-inline par le DOM de carte.
function injecterCartesInline(racine) {
  racine.querySelectorAll('.card-inline').forEach(span => {
    const code = span.dataset.carte;
    if (!code) return;
    span.innerHTML = '';
    if (code === '?') {
      span.appendChild(carteDOM(null));
    } else {
      span.appendChild(carteDOM([parseInt(code[0]), code[1]]));
    }
  });
}

// Rend les formules LaTeX (.tex-inline / .tex-block) avec KaTeX.
function injecterFormules(racine) {
  if (typeof katex === 'undefined') return;
  racine.querySelectorAll('.tex-inline, .tex-block').forEach(node => {
    const tex = node.dataset.tex;
    const displayMode = node.dataset.mode === 'block';
    try {
      katex.render(tex, node, { displayMode, throwOnError: false });
    } catch (e) {
      node.textContent = tex;
    }
  });
}

async function ouvrirAstuces() {
  const overlay = el('div', { class: 'modal-overlay' });
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  const modale = el('div', { class: 'modal astuce-modal' });
  overlay.appendChild(modale);

  const header = el('div', { class: 'astuce-header' });
  header.appendChild(el('div', { class: 'modal-title' }, 'Astuces & tutoriels'));
  header.appendChild(el('div', { class: 'modal-subtitle' },
    'Quelques techniques pour mieux jouer — du plus basique au plus subtil.'));
  header.appendChild(el('button', {
    class: 'astuce-close',
    'aria-label': 'Fermer',
    onclick: () => overlay.remove(),
  }, '×'));
  modale.appendChild(header);

  const tabsBar = el('div', { class: 'astuce-tabs' });
  const body = el('div', { class: 'astuce-body' });
  modale.appendChild(tabsBar);
  modale.appendChild(body);

  document.body.appendChild(overlay);

  let manifest;
  try {
    manifest = await chargerManifesteTutos();
  } catch (e) {
    body.innerHTML = '<div class="astuce-error">Impossible de charger les tutoriels. Servez la page via un serveur HTTP (pas en file://).</div>';
    return;
  }

  if (astuceOngletActif === null || !manifest.find(t => t.id === astuceOngletActif)) {
    astuceOngletActif = manifest[0].id;
  }

  function dessinerOnglets() {
    tabsBar.innerHTML = '';
    manifest.forEach(t => {
      const btn = el('button', {
        class: 'astuce-tab' + (t.id === astuceOngletActif ? ' active' : ''),
        onclick: () => { astuceOngletActif = t.id; dessinerOnglets(); chargerEtAfficher(t.id); },
      }, t.titre);
      tabsBar.appendChild(btn);
    });
  }

  async function chargerEtAfficher(id) {
    body.innerHTML = '<div class="astuce-empty">Chargement…</div>';
    try {
      const md = await chargerTuto(id);
      body.innerHTML = rendreMD(md);
      injecterCartesInline(body);
      injecterFormules(body);
      body.scrollTop = 0;
    } catch (e) {
      body.innerHTML = `<div class="astuce-error">${escHTML(e.message)}</div>`;
    }
  }

  dessinerOnglets();
  chargerEtAfficher(astuceOngletActif);
}

// --- Fin de partie -----------------------------------------------------------

function afficherFin() {
  const gagne = partie.gagnant === 'humain';
  const trouvé = partie.humain_correct === true;
  const overlay = el('div', { class: 'endgame' });

  // Titre : bravo si on a trouvé (même si devancé par l'IA).
  let titre, cls;
  if (gagne) { titre = '✦ Bravo !'; cls = 'win'; }
  else if (trouvé) { titre = '✦ Bravo quand même !'; cls = 'win'; }
  else { titre = '✗ Perdu'; cls = 'lose'; }
  overlay.appendChild(el('div', { class: 'endgame-title ' + cls }, titre));

  let sousTitre;
  if (gagne) {
    sousTitre = 'Vous avez deviné la main de l\'IA.';
  } else if (trouvé) {
    sousTitre = 'Vous avez trouvé la bonne main, mais l\'IA vous a devancé.';
  } else {
    sousTitre = 'Votre devinette n\'était pas la bonne.';
  }
  overlay.appendChild(el('div', { class: 'endgame-subtitle' }, sousTitre));

  if (partie.main_ia) {
    const bloc = el('div');
    bloc.appendChild(el('div', {
      style: 'font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px;text-align:center;',
    }, 'Main de l\'IA révélée'));
    const rangée = el('div', { style: 'display:flex;gap:12px;justify-content:center;' });
    partie.main_ia.forEach(c => rangée.appendChild(carteDOM(c)));
    bloc.appendChild(rangée);
    overlay.appendChild(bloc);
  }

  overlay.appendChild(el('button', {
    class: 'btn btn-primary',
    onclick: () => { overlay.remove(); nouvellePartie(); },
    style: 'margin-top:8px;',
  }, '↺ Rejouer'));

  document.body.appendChild(overlay);
}

// --- Rendu principal ---------------------------------------------------------

function rendre() {
  const root = document.getElementById('jeu');
  root.innerHTML = '';

  // Header
  const header = el('div', { class: 'header' });
  header.appendChild(el('div', { class: 'logo' }, [
    document.createTextNode('Casse '),
    el('span', {}, 'le'),
    document.createTextNode(' Code'),
  ]));
  const droite = el('div', { style: 'display:flex;gap:12px;align-items:center;' });
  const badgeCls = 'turn-badge ' + (partie.tour === 'humain' ? 'humain' : 'ia');
  let textBadge;
  if (partie.tour === 'humain' && partie.ia_terminée) textBadge = 'À vous — l\'IA a fini';
  else if (partie.tour === 'humain') textBadge = 'Votre tour';
  else textBadge = 'Tour de l\'IA…';
  droite.appendChild(el('div', { class: badgeCls }, [
    el('div', { class: 'turn-dot' }),
    textBadge,
  ]));
  droite.appendChild(el('button', {
    class: 'btn btn-ghost',
    onclick: ouvrirAstuces,
    style: 'font-size:10px;padding:5px 12px;',
  }, '✦ Astuce'));
  droite.appendChild(el('button', {
    class: 'btn btn-ghost',
    onclick: nouvellePartie,
    style: 'font-size:10px;padding:5px 12px;',
  }, '↺ Nouvelle partie'));
  header.appendChild(droite);
  root.appendChild(header);

  // Légende du deck (toutes les cartes du jeu, deux lignes : noires / blanches, sauf les 5 verts)
  const legend = el('div', { class: 'deck-legend' });
  legend.appendChild(el('div', { class: 'deck-legend-title' },
    'Toutes les cartes du jeu — 0 à 9, en noir et en blanc (le 5 est toujours vert)'));
  const ligneN = el('div', { class: 'deck-row' });
  const ligneB = el('div', { class: 'deck-row' });
  for (let v = 0; v <= 9; v++) {
    const coul = v === 5 ? 'V' : 'N';
    ligneN.appendChild(carteDOM([v, coul]));
  }
  for (let v = 0; v <= 9; v++) {
    const coul = v === 5 ? 'V' : 'B';
    ligneB.appendChild(carteDOM([v, coul]));
  }
  legend.appendChild(ligneN);
  legend.appendChild(ligneB);
  root.appendChild(legend);

  // Zone IA
  const iaZone = el('div', { class: 'ia-zone' });
  const labelTexte = partie.ia_terminée ? 'Main de l\'IA — cachée (IA a tenté sa devinette)' : 'Main de l\'IA — cachée';
  const labelIA = el('div', { class: 'zone-label' }, labelTexte);
  iaZone.appendChild(labelIA);
  const rangéeIA = el('div', { class: 'cartes-rangée' });
  for (let i = 0; i < partie.taille_main_ia; i++) rangéeIA.appendChild(carteDOM(null));
  iaZone.appendChild(rangéeIA);
  root.appendChild(iaZone);

  // Centre (questions)
  const centreZone = el('div', { class: 'center-zone' });
  const labelC = el('div', { class: 'zone-label' }, 'Questions disponibles');
  labelC.appendChild(el('span', { class: 'stat' }, `  Pioche : ${partie.taille_pioche}`));
  centreZone.appendChild(labelC);
  const grid = el('div', { class: 'questions-grid' });
  partie.centre.forEach((nom, i) => {
    const cls = 'qcard' + ((partie.tour !== 'humain' || partie.fini) ? ' disabled' : '');
    grid.appendChild(el('div', {
      class: cls,
      onclick: () => poserQuestion(i),
    }, nom));
  });
  centreZone.appendChild(grid);
  root.appendChild(centreZone);

  // Zone joueur
  const pZone = el('div', { class: 'player-zone' });
  const labelP = el('div', { class: 'zone-label' }, 'Votre main');
  labelP.appendChild(el('span', { class: 'stat' },
    `  Candidats : ${partie.candidats_humain}`));
  pZone.appendChild(labelP);
  const row = el('div', { class: 'player-row' });
  const mesCartes = el('div', { class: 'cartes-rangée' });
  partie.main_humain.forEach(c => mesCartes.appendChild(carteDOM(c)));
  row.appendChild(mesCartes);
  row.appendChild(el('button', {
    class: 'btn btn-primary',
    onclick: ouvrirModaleDevinette,
    disabled: partie.tour !== 'humain' || partie.fini,
  }, '✦ Deviner la main adverse'));
  pZone.appendChild(row);
  root.appendChild(pZone);

  // Historique
  const hZone = el('div', { class: 'history-zone' });
  const nbHumain = partie.historique.filter(h => h.qui === 'humain').length;
  const nbIA = partie.historique.filter(h => h.qui === 'ia').length;
  hZone.appendChild(el('div', { class: 'history-header' },
    `Historique — ${partie.historique.length} tour${partie.historique.length !== 1 ? 's' : ''}`));

  const tabs = el('div', { class: 'history-tabs' });
  [
    ['tous', `Tous (${partie.historique.length})`, ''],
    ['humain', `Vous (${nbHumain})`, 'tab-humain'],
    ['ia', `IA (${nbIA})`, 'tab-ia'],
  ].forEach(([id, label, cls]) => {
    const btn = el('button', {
      class: 'history-tab ' + cls + (ongletHist === id ? ' active' : ''),
      onclick: () => { ongletHist = id; rendre(); },
    }, label);
    tabs.appendChild(btn);
  });
  hZone.appendChild(tabs);

  const filtrés = ongletHist === 'tous'
    ? partie.historique
    : partie.historique.filter(h => h.qui === ongletHist);

  const scroll = el('div', { class: 'history-scroll' });
  if (filtrés.length === 0) {
    scroll.appendChild(el('div', { class: 'history-empty' },
      partie.historique.length === 0 ? 'Aucune question posée' : 'Rien dans cet onglet'));
  } else {
    filtrés.forEach(h => {
      const item = el('div', { class: 'hist-item ' + h.qui });
      item.appendChild(el('div', { class: 'hist-qui' }, h.qui === 'humain' ? 'Vous' : 'IA'));
      item.appendChild(el('div', { class: 'hist-q' }, h.question));
      item.appendChild(el('div', { class: 'hist-r' }, '→ ' + h.réponse));
      if (h.entropie !== undefined) {
        item.appendChild(el('div', { class: 'hist-h' },
          `H = ${h.entropie.toFixed(2)} bits`));
      }
      scroll.appendChild(item);
    });
  }
  hZone.appendChild(scroll);
  setTimeout(() => { scroll.scrollTop = scroll.scrollHeight; }, 0);
  root.appendChild(hZone);

  if (partie.fini) setTimeout(afficherFin, 400);
}

// Démarrage
nouvellePartie();
</script>
</body>
</html>
